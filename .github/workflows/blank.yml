name: Package lite mitigation benchmark dependencies

on:
  workflow_dispatch:

  push:
    branches: [ main ]
    paths:
      - ".github/workflows/package-lite-dependencies.yml"

permissions:
  contents: write

concurrency:
  group: package-lite-dependencies-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package-lite:
    name: Build under-100MB dependency pack
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    env:
      PACK_DIR: dependency-pack-lite
      OUT_DIR: packed-dependencies-lite
      OLD_FULL_OUT_DIR: packed-dependencies
      OUT_ZIP: mitigationbench-target-dependencies-lite.zip
      MAX_ZIP_BYTES: "99614720" # 95 MiB

    steps:
      - name: Sparse checkout repo without old large dependency parts
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github
            README.md
            packed-dependencies-lite
          sparse-checkout-cone-mode: true

      - name: Remove old full dependency pack from Git index
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Important:
          # Because sparse checkout does not materialize packed-dependencies/,
          # remove it from the index using git rm on the pathspec.
          # Ignore failure if it is already absent.
          git rm -r --ignore-unmatch "$OLD_FULL_OUT_DIR" || true

          # Also clean old lite output from working tree/index.
          git rm -r --ignore-unmatch "$OUT_DIR" || true
          rm -rf "$PACK_DIR" "$OUT_DIR" "$OUT_ZIP"

      - name: Install host tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates curl git jq unzip zip rsync

      - name: Build lite dependency pack
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$PACK_DIR"/{repos,papers,pointers,metadata}
          mkdir -p "$OUT_DIR"

          cat > "$PACK_DIR/MANIFEST.generated.json" <<'JSON'
          {
            "pack_kind": "lite-under-100mb",
            "policy": {
              "include": [
                "benchmark source",
                "configs",
                "docs",
                "small test environments",
                "paper PDFs when small enough",
                "metadata and external pointers"
              ],
              "exclude": [
                "Docker image archives",
                "full Hugging Face datasets",
                "large bundled legacy toolchains",
                "large prebuilt binaries unless explicitly small"
              ]
            },
            "items": []
          }
          JSON

          add_manifest_item() {
            local type="$1"
            local name="$2"
            local source="$3"
            local path="$4"
            local status="$5"
            local reason="$6"

            tmp="$(mktemp)"
            jq \
              --arg type "$type" \
              --arg name "$name" \
              --arg source "$source" \
              --arg path "$path" \
              --arg status "$status" \
              --arg reason "$reason" \
              '.items += [{
                type:$type,
                name:$name,
                source:$source,
                path:$path,
                status:$status,
                reason:$reason
              }]' \
              "$PACK_DIR/MANIFEST.generated.json" > "$tmp"
            mv "$tmp" "$PACK_DIR/MANIFEST.generated.json"
          }

          sparse_clone() {
            local name="$1"
            local url="$2"
            local branch="$3"
            shift 3

            local dest="$PACK_DIR/repos/$name"

            echo "Sparse cloning $name..."

            if git clone --depth 1 --filter=blob:none --sparse --branch "$branch" "$url" "$dest"; then
              git -C "$dest" sparse-checkout set "$@"
            else
              echo "Branch $branch failed for $name; retrying default branch..."
              git clone --depth 1 --filter=blob:none --sparse "$url" "$dest"
              git -C "$dest" sparse-checkout set "$@"
            fi

            rm -rf "$dest/.git"
            add_manifest_item "repo_sparse" "$name" "$url#$branch" "repos/$name" "ok" "Sparse source/config/docs only"
          }

          download_pdf_if_small() {
            local name="$1"
            local url="$2"
            local dest="$PACK_DIR/papers/$name"
            local max_bytes="$3"

            echo "Downloading paper candidate $name..."

            if curl -fL --retry 3 --retry-delay 5 --max-filesize "$max_bytes" "$url" -o "$dest"; then
              add_manifest_item "paper_pdf" "$name" "$url" "papers/$name" "ok" "PDF included because it is below size cap"
            else
              rm -f "$dest"
              cat > "$PACK_DIR/pointers/${name}.url.txt" <<EOF
          $url
          EOF
              add_manifest_item "paper_pointer" "$name" "$url" "pointers/${name}.url.txt" "pointer_only" "PDF skipped because unavailable or above size cap"
            fi
          }

          sparse_clone \
            "exploitbench" \
            "https://github.com/exploitbench/exploitbench.git" \
            "main" \
            "README.md" \
            "LICENSE" \
            "Makefile" \
            "pyproject.toml" \
            "benchmarks" \
            "docs" \
            "exploitbench" \
            "scripts" \
            "testenvs/sample-stack-bof" \
            "data"

          sparse_clone \
            "vusec-typearmor" \
            "https://github.com/vusec/typearmor.git" \
            "master" \
            "README.md" \
            "LICENSE-2.0.txt" \
            "Makefile.inc" \
            "envsetup.sh" \
            "run-ta-static.sh" \
            "include" \
            "static" \
            "di-opt" \
            "server-bins"

          sparse_clone \
            "vusec-patharmor-lite" \
            "https://github.com/vusec/patharmor.git" \
            "master" \
            "README.md" \
            "INSTALL.md" \
            "LICENSE.md" \
            "Makefile" \
            "Makefile.inc" \
            "toy-bug" \
            "run-analyser.sh" \
            "run-app.sh" \
            "run-at.sh" \
            "lkm-start.sh" \
            "patches" \
            "typescript.*"

          rm -rf \
            "$PACK_DIR/repos/vusec-patharmor-lite/Dyninst-8.2.1" \
            "$PACK_DIR/repos/vusec-patharmor-lite/DynamoRIO-Linux-5.0.0-9" \
            "$PACK_DIR/repos/vusec-patharmor-lite/nginx-0.8.54"

          cat > "$PACK_DIR/pointers/exploitbench-ghcr-images.txt" <<'EOF'
          Do not vendor these in Git.

          ExploitBench V8 images are published at:
          ghcr.io/exploitbench/v8-r1

          Example:
          docker pull ghcr.io/exploitbench/v8-r1:cve-2024-1939
          EOF

          add_manifest_item \
            "excluded_dependency" \
            "ExploitBench V8 Docker images" \
            "ghcr.io/exploitbench/v8-r1" \
            "pointers/exploitbench-ghcr-images.txt" \
            "pointer_only" \
            "Docker images are too large for a sub-100MB GitHub repo pack; pull on first use"

          cat > "$PACK_DIR/pointers/exploitbench-v8-dataset.txt" <<'EOF'
          Do not vendor the full dataset in this repo.

          Dataset:
          https://huggingface.co/datasets/exploitbench/v8

          Suggested local retrieval:
          git lfs install
          git clone https://huggingface.co/datasets/exploitbench/v8 exploitbench-v8
          EOF

          add_manifest_item \
            "excluded_dataset" \
            "ExploitBench Hugging Face v8 dataset" \
            "https://huggingface.co/datasets/exploitbench/v8" \
            "pointers/exploitbench-v8-dataset.txt" \
            "pointer_only" \
            "Dataset is above the sub-100MB pack target"

          cat > "$PACK_DIR/pointers/patharmor-heavy-deps.txt" <<'EOF'
          Excluded from lite pack:

          - Dyninst-8.2.1
          - DynamoRIO-Linux-5.0.0-9
          - nginx-0.8.54

          These exist in the upstream PathArmor repo but are intentionally omitted
          from the under-100MB dependency pack.
          EOF

          add_manifest_item \
            "excluded_legacy_toolchains" \
            "PathArmor bundled Dyninst/DynamoRIO/nginx" \
            "https://github.com/vusec/patharmor" \
            "pointers/patharmor-heavy-deps.txt" \
            "pointer_only" \
            "Bundled legacy deps are heavyweight; keep source pointers and toy-bug only"

          download_pdf_if_small \
            "quicksafe-sp26.pdf" \
            "https://download.vusec.net/papers/quicksafe_sp26.pdf" \
            "25000000"

          download_pdf_if_small \
            "codearmor-eurosp-2017.pdf" \
            "https://download.vusec.net/papers/codearmor-eurosp-2017.pdf" \
            "25000000"

          download_pdf_if_small \
            "exploitbench-arxiv-2605.14153.pdf" \
            "https://arxiv.org/pdf/2605.14153" \
            "25000000"

          cat > "$PACK_DIR/README.md" <<'EOF'
          # MitigationBench Lite Dependency Pack

          This is the under-100MB dependency pack.

          Included:
          - ExploitBench source/config/docs/sample environment.
          - TypeArmor source and server-bins where available.
          - PathArmor lightweight source/docs/toy/log assets.
          - Small paper PDFs when below the cap.
          - Pointers for heavyweight assets.

          Excluded:
          - ExploitBench Docker images.
          - Full ExploitBench Hugging Face dataset.
          - PathArmor bundled legacy toolchains.
          - Large binary archives.
          EOF

          (
            cd "$PACK_DIR"
            find . -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          )

          echo "Lite pack inventory:"
          du -ah "$PACK_DIR" | sort -h | tail -60

      - name: Build ZIP and enforce under-100MB target
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$OUT_DIR"
          rm -f "$OUT_DIR/$OUT_ZIP"

          zip -r "$OUT_DIR/$OUT_ZIP" "$PACK_DIR"

          size="$(stat -c%s "$OUT_DIR/$OUT_ZIP")"
          echo "$size" > "$OUT_DIR/${OUT_ZIP}.bytes"
          sha256sum "$OUT_DIR/$OUT_ZIP" > "$OUT_DIR/${OUT_ZIP}.sha256"
          ls -lh "$OUT_DIR" > "$OUT_DIR/FILES.txt"

          if [ "$size" -gt "$MAX_ZIP_BYTES" ]; then
            echo "::error::Lite ZIP is too large: $size bytes > $MAX_ZIP_BYTES bytes"
            echo "Largest files:"
            find "$PACK_DIR" -type f -printf "%s %p\n" | sort -nr | head -50
            exit 1
          fi

          cat > "$OUT_DIR/README.md" <<EOF
          # MitigationBench Lite Dependency Pack

          This directory contains a single under-100MB ZIP:

          \`\`\`text
          $OUT_ZIP
          \`\`\`

          Verify:

          \`\`\`bash
          sha256sum -c ${OUT_ZIP}.sha256
          unzip ${OUT_ZIP}
          \`\`\`

          This pack intentionally excludes heavyweight Docker images, full datasets,
          and large legacy toolchains. See dependency-pack-lite/pointers/ after unzip.
          EOF

          echo "Final output:"
          cat "$OUT_DIR/FILES.txt"

      - name: Commit and push lite pack
        shell: bash
        run: |
          set -euo pipefail

          git add -A "$OUT_DIR"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git status --short
          git commit -m "Replace full dependency pack with under-100MB lite pack [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Upload lite pack as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mitigationbench-target-dependencies-lite
          path: packed-dependencies-lite/
          retention-days: 14
