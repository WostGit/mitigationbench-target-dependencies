name: Package mitigation benchmark dependencies

on:
  workflow_dispatch:
    inputs:
      include_docker_images:
        description: "Also pull and docker-save selected ExploitBench GHCR images. This can be very large."
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      include_huggingface_dataset:
        description: "Download ExploitBench Hugging Face dataset metadata/artifacts when available."
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

  push:
    branches: [ main ]
    paths:
      - ".github/workflows/package-dependencies.yml"

permissions:
  contents: write
  packages: read

concurrency:
  group: package-dependencies-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Download, split, and push dependency pack
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    env:
      PACK_DIR: dependency-pack
      OUT_ZIP: mitigationbench-target-dependencies.zip
      PARTS_DIR: packed-dependencies
      PART_SIZE: 25M
      INCLUDE_DOCKER_IMAGES: ${{ inputs.include_docker_images || 'false' }}
      INCLUDE_HUGGINGFACE_DATASET: ${{ inputs.include_huggingface_dataset || 'false' }}

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install host tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates curl git git-lfs jq unzip zip

      - name: Download and package dependencies
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "$PACK_DIR" "$OUT_ZIP" "$PARTS_DIR"
          mkdir -p "$PACK_DIR"/{repos,papers,docker-images,datasets,metadata}
          mkdir -p "$PARTS_DIR"

          cat > "$PACK_DIR/MANIFEST.generated.json" <<'JSON'
          {
            "generated_by": "mitigationbench-targetpack-fetcher",
            "items": []
          }
          JSON

          add_manifest_item() {
            local type="$1"
            local name="$2"
            local source="$3"
            local path="$4"
            local status="$5"

            tmp="$(mktemp)"
            jq \
              --arg type "$type" \
              --arg name "$name" \
              --arg source "$source" \
              --arg path "$path" \
              --arg status "$status" \
              '.items += [{type:$type,name:$name,source:$source,path:$path,status:$status}]' \
              "$PACK_DIR/MANIFEST.generated.json" > "$tmp"
            mv "$tmp" "$PACK_DIR/MANIFEST.generated.json"
          }

          clone_repo() {
            local name="$1"
            local url="$2"
            local ref="$3"
            local dest="$PACK_DIR/repos/$name"

            echo "Cloning $name..."
            if git clone --depth 1 --branch "$ref" "$url" "$dest"; then
              (
                cd "$dest"
                git rev-parse HEAD > "../../metadata/${name}.commit"
              )
              add_manifest_item "repo" "$name" "$url#$ref" "repos/$name" "ok"
            else
              echo "Ref $ref failed for $name, retrying default branch..."
              if git clone --depth 1 "$url" "$dest"; then
                (
                  cd "$dest"
                  git rev-parse HEAD > "../../metadata/${name}.commit"
                )
                add_manifest_item "repo" "$name" "$url#default" "repos/$name" "ok_ref_fallback"
              else
                add_manifest_item "repo" "$name" "$url#$ref" "repos/$name" "failed"
              fi
            fi
          }

          download_file() {
            local name="$1"
            local url="$2"
            local dest="$PACK_DIR/papers/$name"

            echo "Downloading $name..."
            if curl -fL --retry 3 --retry-delay 5 "$url" -o "$dest"; then
              add_manifest_item "paper" "$name" "$url" "papers/$name" "ok"
            else
              add_manifest_item "paper" "$name" "$url" "papers/$name" "failed"
            fi
          }

          save_docker_image() {
            local image="$1"
            local safe
            safe="$(echo "$image" | tr '/:@' '___')"
            local dest="$PACK_DIR/docker-images/${safe}.tar"

            echo "Pulling Docker image $image..."
            if docker pull "$image"; then
              docker image inspect "$image" > "$PACK_DIR/metadata/${safe}.docker-inspect.json"
              docker save "$image" -o "$dest"
              gzip -9 "$dest"
              add_manifest_item "docker_image" "$image" "$image" "docker-images/${safe}.tar.gz" "ok"
            else
              add_manifest_item "docker_image" "$image" "$image" "docker-images/${safe}.tar.gz" "failed"
            fi
          }

          clone_repo "exploitbench" "https://github.com/exploitbench/exploitbench.git" "main"
          clone_repo "vusec-typearmor" "https://github.com/vusec/typearmor.git" "master"
          clone_repo "vusec-patharmor" "https://github.com/vusec/patharmor.git" "master"

          download_file "quicksafe-sp26.pdf" "https://download.vusec.net/papers/quicksafe_sp26.pdf"
          download_file "codearmor-eurosp-2017.pdf" "https://download.vusec.net/papers/codearmor-eurosp-2017.pdf"
          download_file "exploitbench-arxiv-2605.14153.pdf" "https://arxiv.org/pdf/2605.14153"

          mkdir -p "$PACK_DIR/datasets/exploitbench-v8"
          cat > "$PACK_DIR/datasets/exploitbench-v8/README.fetch.txt" <<'EOF'
          Dataset pointer:
          https://huggingface.co/datasets/exploitbench/v8

          Full local clone:
          git lfs install
          git clone https://huggingface.co/datasets/exploitbench/v8 exploitbench-v8
          EOF

          if [ "$INCLUDE_HUGGINGFACE_DATASET" = "true" ]; then
            git lfs install
            git clone https://huggingface.co/datasets/exploitbench/v8 "$PACK_DIR/datasets/exploitbench-v8/full-clone" || true
            add_manifest_item "huggingface_dataset" "exploitbench-v8" "https://huggingface.co/datasets/exploitbench/v8" "datasets/exploitbench-v8" "attempted"
          else
            add_manifest_item "huggingface_dataset" "exploitbench-v8" "https://huggingface.co/datasets/exploitbench/v8" "datasets/exploitbench-v8/README.fetch.txt" "pointer_only"
          fi

          if [ "$INCLUDE_DOCKER_IMAGES" = "true" ]; then
            save_docker_image "ghcr.io/exploitbench/v8-r1:cve-2024-1939"
            save_docker_image "ghcr.io/exploitbench/v8-r1:cve-2024-6100"
            save_docker_image "ghcr.io/exploitbench/v8-r1:cve-2024-10231"
            save_docker_image "ghcr.io/exploitbench/v8-r1:cve-2024-12053"
          else
            cat > "$PACK_DIR/docker-images/README.fetch.txt" <<'EOF'
          Docker images were skipped by default.

          Re-run the workflow manually with:
          include_docker_images = true

          Example manual pull:
          docker pull ghcr.io/exploitbench/v8-r1:cve-2024-1939
          EOF
            add_manifest_item "docker_image_set" "exploitbench-v8-selected" "ghcr.io/exploitbench/v8-r1" "docker-images/README.fetch.txt" "skipped_by_default"
          fi

          (
            cd "$PACK_DIR"
            find . -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          )

          zip -r "$OUT_ZIP" "$PACK_DIR"

      - name: Split ZIP into 25 MB parts
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "$PARTS_DIR"
          mkdir -p "$PARTS_DIR"

          split -b "$PART_SIZE" -d -a 5 "$OUT_ZIP" "$PARTS_DIR/${OUT_ZIP}.part-"

          sha256sum "$OUT_ZIP" > "$PARTS_DIR/${OUT_ZIP}.sha256"
          ls -lh "$PARTS_DIR" > "$PARTS_DIR/FILES.txt"

          cat > "$PARTS_DIR/README.md" <<EOF
          # MitigationBench target dependency pack

          This folder contains split parts of:

          \`\`\`text
          $OUT_ZIP
          \`\`\`

          Recombine on Linux/macOS:

          \`\`\`bash
          cat ${OUT_ZIP}.part-* > ${OUT_ZIP}
          sha256sum -c ${OUT_ZIP}.sha256
          unzip ${OUT_ZIP}
          \`\`\`

          Recombine on Windows PowerShell:

          \`\`\`powershell
          cmd /c copy /b ${OUT_ZIP}.part-* ${OUT_ZIP}
          \`\`\`

          Parts are split at $PART_SIZE to stay below connector and GitHub file-size limits.
          EOF

          echo "Created split files:"
          ls -lh "$PARTS_DIR"

      - name: Commit and push split parts
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A "$PARTS_DIR"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Add 25MB split mitigation benchmark dependency pack [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Upload split parts as workflow artifact too
        uses: actions/upload-artifact@v4
        with:
          name: mitigationbench-target-dependencies-25mb-split
          path: packed-dependencies/
          retention-days: 14
